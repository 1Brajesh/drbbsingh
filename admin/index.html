<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Dr. B.B. Singh Remembrances</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1c1714;
      color: #f5efe6;
      font-family: "Cormorant Garamond", "Iowan Old Style", Georgia, serif;
      min-height: 100svh;
      padding: 3rem 1.5rem 6rem;
    }

    .admin-wrap {
      max-width: 700px;
      margin: 0 auto;
    }

    /* ── Header ── */

    .admin-header {
      text-align: center;
      margin-bottom: 3.5rem;
    }

    .admin-title {
      font-size: clamp(1.2rem, 3vw, 1.6rem);
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(201, 169, 110, 0.85);
      margin-bottom: 0.4rem;
    }

    .admin-subtitle {
      font-size: clamp(0.85rem, 1.8vw, 0.95rem);
      font-style: italic;
      color: rgba(245, 239, 230, 0.35);
    }

    .admin-rule {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201, 169, 110, 0.4), transparent);
      margin: 1.5rem auto 0;
    }

    /* ── Auth gate ── */

    .token-gate {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      padding: 3rem 0;
    }

    .token-label {
      font-size: clamp(0.75rem, 1.5vw, 0.85rem);
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(201, 169, 110, 0.55);
    }

    .token-input {
      background: rgba(245, 239, 230, 0.04);
      border: 1px solid rgba(201, 169, 110, 0.2);
      border-radius: 3px;
      color: rgba(245, 239, 230, 0.8);
      font-family: monospace;
      font-size: 0.9rem;
      padding: 0.65rem 1rem;
      width: 100%;
      max-width: 420px;
      transition: border-color 0.2s;
    }

    .token-input:focus {
      outline: none;
      border-color: rgba(201, 169, 110, 0.5);
    }

    .token-btn {
      background: transparent;
      border: 1px solid rgba(201, 169, 110, 0.4);
      border-radius: 3px;
      color: rgba(201, 169, 110, 0.75);
      cursor: pointer;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(0.85rem, 1.8vw, 0.95rem);
      font-weight: 600;
      letter-spacing: 0.14em;
      padding: 0.6rem 2rem;
      text-transform: uppercase;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .token-btn:hover {
      border-color: rgba(201, 169, 110, 0.75);
      color: rgba(201, 169, 110, 1);
      background: rgba(201, 169, 110, 0.06);
    }

    .token-note {
      font-size: 0.82rem;
      font-style: italic;
      color: rgba(245, 239, 230, 0.25);
      text-align: center;
      max-width: 380px;
    }

    .token-error {
      font-size: 0.88rem;
      color: rgba(220, 100, 100, 0.8);
    }

    /* ── Pending list ── */

    .pending-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .pending-title {
      font-size: clamp(0.75rem, 1.5vw, 0.85rem);
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(201, 169, 110, 0.6);
    }

    .signout-btn {
      background: transparent;
      border: none;
      color: rgba(245, 239, 230, 0.25);
      cursor: pointer;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0;
      transition: color 0.2s;
    }

    .signout-btn:hover { color: rgba(245, 239, 230, 0.6); }

    .pending-empty {
      font-size: clamp(1rem, 2vw, 1.1rem);
      font-style: italic;
      color: rgba(245, 239, 230, 0.3);
      text-align: center;
      padding: 3rem 0;
    }

    /* ── Submission card ── */

    .submission-card {
      border: 1px solid rgba(201, 169, 110, 0.15);
      border-radius: 4px;
      padding: 1.8rem;
      margin-bottom: 1.4rem;
      background: rgba(245, 239, 230, 0.02);
    }

    .card-meta {
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      color: rgba(245, 239, 230, 0.25);
      margin-bottom: 1.1rem;
    }

    .card-name {
      font-size: clamp(1rem, 2vw, 1.15rem);
      font-weight: 600;
      color: rgba(201, 169, 110, 0.85);
      margin-bottom: 0.2rem;
    }

    .card-connection {
      font-size: clamp(0.82rem, 1.6vw, 0.9rem);
      color: rgba(245, 239, 230, 0.4);
      margin-bottom: 1rem;
      letter-spacing: 0.03em;
    }

    .card-message {
      font-size: clamp(1rem, 2vw, 1.1rem);
      font-style: italic;
      line-height: 1.75;
      color: rgba(245, 239, 230, 0.65);
      margin-bottom: 1.5rem;
    }

    .card-actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .btn {
      background: transparent;
      border-radius: 3px;
      cursor: pointer;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(0.78rem, 1.5vw, 0.86rem);
      font-weight: 600;
      letter-spacing: 0.12em;
      padding: 0.45rem 1.2rem;
      text-transform: uppercase;
      transition: all 0.2s;
    }

    .btn-approve {
      border: 1px solid rgba(120, 180, 120, 0.4);
      color: rgba(120, 200, 120, 0.75);
    }

    .btn-approve:hover {
      border-color: rgba(120, 180, 120, 0.8);
      color: rgba(120, 200, 120, 1);
      background: rgba(120, 180, 120, 0.06);
    }

    .btn-edit {
      border: 1px solid rgba(201, 169, 110, 0.3);
      color: rgba(201, 169, 110, 0.65);
    }

    .btn-edit:hover {
      border-color: rgba(201, 169, 110, 0.7);
      color: rgba(201, 169, 110, 1);
      background: rgba(201, 169, 110, 0.05);
    }

    .btn-reject {
      border: 1px solid rgba(200, 80, 80, 0.25);
      color: rgba(200, 100, 100, 0.55);
    }

    .btn-reject:hover {
      border-color: rgba(200, 80, 80, 0.6);
      color: rgba(220, 100, 100, 0.9);
      background: rgba(200, 80, 80, 0.04);
    }

    .btn:disabled {
      opacity: 0.35;
      cursor: default;
    }

    /* ── Inline edit form ── */

    .edit-form {
      margin-top: 1.4rem;
      padding-top: 1.4rem;
      border-top: 1px solid rgba(201, 169, 110, 0.1);
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .edit-field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .edit-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(201, 169, 110, 0.45);
    }

    .edit-input,
    .edit-textarea {
      background: rgba(245, 239, 230, 0.04);
      border: 1px solid rgba(201, 169, 110, 0.2);
      border-radius: 3px;
      color: rgba(245, 239, 230, 0.8);
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 1rem;
      padding: 0.55rem 0.8rem;
      transition: border-color 0.2s;
      width: 100%;
    }

    .edit-input:focus,
    .edit-textarea:focus {
      outline: none;
      border-color: rgba(201, 169, 110, 0.5);
    }

    .edit-textarea {
      min-height: 100px;
      resize: vertical;
      line-height: 1.6;
    }

    .edit-actions {
      display: flex;
      gap: 0.75rem;
    }

    .card-status {
      font-size: 0.82rem;
      font-style: italic;
      color: rgba(245, 239, 230, 0.3);
      margin-top: 0.8rem;
    }

    /* ── Published entry checkboxes ── */

    .submission-card.selectable {
      position: relative;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .submission-card.selectable:hover {
      border-color: rgba(201, 169, 110, 0.3);
      background: rgba(245, 239, 230, 0.03);
    }

    .submission-card.selectable.selected {
      border-color: rgba(201, 169, 110, 0.5);
      background: rgba(201, 169, 110, 0.05);
    }

    .card-checkbox {
      position: absolute;
      top: 1.2rem;
      right: 1.2rem;
      width: 18px;
      height: 18px;
      border: 1.5px solid rgba(201, 169, 110, 0.35);
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(201, 169, 110, 0.9);
      font-size: 0.75rem;
      transition: border-color 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    .submission-card.selected .card-checkbox {
      background: rgba(201, 169, 110, 0.15);
      border-color: rgba(201, 169, 110, 0.75);
    }

    .delete-selected-wrap {
      margin-top: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.2rem;
      flex-wrap: wrap;
    }

    .delete-selected-btn {
      background: transparent;
      border: 1px solid rgba(200, 80, 80, 0.3);
      border-radius: 3px;
      color: rgba(200, 100, 100, 0.6);
      cursor: pointer;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(0.78rem, 1.5vw, 0.86rem);
      font-weight: 600;
      letter-spacing: 0.12em;
      padding: 0.5rem 1.4rem;
      text-transform: uppercase;
      transition: all 0.2s;
    }

    .delete-selected-btn:not(:disabled):hover {
      border-color: rgba(200, 80, 80, 0.7);
      color: rgba(220, 100, 100, 0.95);
      background: rgba(200, 80, 80, 0.05);
    }

    .delete-selected-btn:disabled {
      opacity: 0.25;
      cursor: default;
    }

    .delete-status {
      font-size: 0.85rem;
      font-style: italic;
      color: rgba(245, 239, 230, 0.35);
    }

    .approve-selected-btn {
      border-color: rgba(120, 180, 120, 0.3);
      color: rgba(120, 200, 120, 0.6);
    }

    .approve-selected-btn:not(:disabled):hover {
      border-color: rgba(120, 180, 120, 0.7);
      color: rgba(120, 200, 120, 0.95);
      background: rgba(120, 180, 120, 0.05);
    }

    .reject-selected-btn {
      border-color: rgba(200, 80, 80, 0.3);
      color: rgba(200, 100, 100, 0.6);
    }

    .reject-selected-btn:not(:disabled):hover {
      border-color: rgba(200, 80, 80, 0.7);
      color: rgba(220, 100, 100, 0.95);
      background: rgba(200, 80, 80, 0.05);
    }
  </style>
</head>
<body>

  <div class="admin-wrap">

    <header class="admin-header">
      <h1 class="admin-title">Remembrances</h1>
      <p class="admin-subtitle">drbbsingh.com &mdash; admin panel</p>
      <div class="admin-rule"></div>
      <a href="/" style="display:inline-block;margin-top:1.2rem;font-size:0.82rem;letter-spacing:0.1em;text-transform:uppercase;color:rgba(201,169,110,0.4);text-decoration:none;transition:color 0.2s;" onmouseover="this.style.color='rgba(201,169,110,0.85)'" onmouseout="this.style.color='rgba(201,169,110,0.4)'">&larr; Back to site</a>
    </header>

    <!-- Auth gate (magic link) -->
    <div id="authGate" class="token-gate">
      <label class="token-label" for="authEmail">Admin email</label>
      <input class="token-input" id="authEmail" type="email"
             placeholder="you@example.com" autocomplete="email"
             inputmode="email" spellcheck="false">
      <button class="token-btn" id="authBtn" type="button">Send magic link</button>
      <p class="token-note" id="authStatus">
        Enter your admin email; a one-time sign-in link will be sent to you.
      </p>
      <p class="token-error" id="authError" hidden></p>
    </div>

    <!-- Pending submissions (shown after auth) -->
    <div id="pendingPanel" hidden>
      <div class="pending-header">
        <span class="pending-title" id="pendingTitle">Pending</span>
        <button class="signout-btn" id="signoutBtn" type="button">Sign out</button>
      </div>
      <div id="pendingList"></div>
      <div class="delete-selected-wrap" id="approveSelectedWrap" hidden>
        <button class="delete-selected-btn approve-selected-btn" id="approveSelectedBtn" type="button" disabled>
          Approve Selected
        </button>
        <span class="delete-status" id="approveStatus"></span>
      </div>
      <div class="delete-selected-wrap" id="rejectSelectedWrap" hidden>
        <button class="delete-selected-btn reject-selected-btn" id="rejectSelectedBtn" type="button" disabled>
          Reject Selected
        </button>
        <span class="delete-status" id="rejectStatus"></span>
      </div>

      <!-- Published entries -->
      <div style="margin-top:3.5rem;padding-top:3rem;border-top:1px solid rgba(201,169,110,0.12);">
        <div class="pending-header">
          <span class="pending-title" id="publishedTitle">Published</span>
        </div>
        <div id="publishedList"></div>
        <div class="delete-selected-wrap" id="deleteSelectedWrap" hidden>
          <button class="delete-selected-btn" id="deleteSelectedBtn" type="button" disabled>
            Delete Selected
          </button>
          <span class="delete-status" id="deleteStatus"></span>
        </div>
      </div>
    </div>

  </div>

  <script>
    (function () {
      'use strict';

      var SUPABASE_URL = 'https://tmnfqdmklbauznpoqrll.supabase.co';
      var SUPABASE_KEY = 'sb_publishable_JSqT5FZkB-tTNR1dJxCMPQ_khoAbrzS';
      var ADMIN_EMAIL  = 'pilotbk@gmail.com';
      var sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      var authGate    = document.getElementById('authGate');
      var authEmail   = document.getElementById('authEmail');
      var authBtn     = document.getElementById('authBtn');
      var authStatus  = document.getElementById('authStatus');
      var authError   = document.getElementById('authError');
      var pendingPanel       = document.getElementById('pendingPanel');
      var pendingList        = document.getElementById('pendingList');
      var pendingTitle       = document.getElementById('pendingTitle');
      var publishedList      = document.getElementById('publishedList');
      var publishedTitle     = document.getElementById('publishedTitle');
      var deleteSelectedWrap = document.getElementById('deleteSelectedWrap');
      var deleteSelectedBtn  = document.getElementById('deleteSelectedBtn');
      var deleteStatus       = document.getElementById('deleteStatus');
      var approveSelectedWrap = document.getElementById('approveSelectedWrap');
      var approveSelectedBtn  = document.getElementById('approveSelectedBtn');
      var approveStatus       = document.getElementById('approveStatus');
      var rejectSelectedWrap  = document.getElementById('rejectSelectedWrap');
      var rejectSelectedBtn   = document.getElementById('rejectSelectedBtn');
      var rejectStatus        = document.getElementById('rejectStatus');
      var signoutBtn          = document.getElementById('signoutBtn');

      var DEFAULT_AUTH_NOTE = 'Enter your admin email; a one-time sign-in link will be sent to you.';

      // ── Auth ──────────────────────────────────────────────
      authBtn.addEventListener('click', function () {
        var email = authEmail.value.trim();
        if (!email) { return; }
        authBtn.disabled = true;
        authError.hidden = true;
        authStatus.textContent = 'Sending magic link…';

        sb.auth.signInWithOtp({
          email: email,
          options: { emailRedirectTo: window.location.href }
        }).then(function (res) {
          authBtn.disabled = false;
          if (res.error) {
            authError.textContent = res.error.message;
            authError.hidden = false;
            authStatus.textContent = DEFAULT_AUTH_NOTE;
          } else {
            authStatus.textContent = 'Check your email — sign-in link sent to ' + email + '.';
          }
        });
      });

      authEmail.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') { authBtn.click(); }
      });

      signoutBtn.addEventListener('click', function () {
        sb.auth.signOut().then(function () {
          pendingPanel.hidden = true;
          authGate.hidden = false;
          authEmail.value = '';
          authStatus.textContent = DEFAULT_AUTH_NOTE;
          authError.hidden = true;
          pendingList.innerHTML = '';
          publishedList.innerHTML = '';
        });
      });

      sb.auth.onAuthStateChange(function (event, session) {
        if (event === 'SIGNED_IN' && session) {
          handleSession(session);
        }
      });

      function handleSession(session) {
        if (!session || !session.user || session.user.email !== ADMIN_EMAIL) {
          authError.textContent = 'This account is not authorized.';
          authError.hidden = false;
          sb.auth.signOut();
          return;
        }
        showPanel();
      }

      function showPanel() {
        authGate.hidden = true;
        pendingPanel.hidden = false;
        loadPending();
        loadPublished();
      }

      // ── Formatters / helpers ─────────────────────────────
      function formatDate(iso) {
        if (!iso) return '';
        var d = new Date(iso);
        return isNaN(d) ? '' : d.toLocaleDateString('en-GB', {
          day: 'numeric', month: 'long', year: 'numeric'
        });
      }

      function formatYear(iso) {
        if (!iso) return '';
        var d = new Date(iso);
        return isNaN(d) ? '' : String(d.getFullYear());
      }

      function setCardBusy(card, busy) {
        card.querySelectorAll('.btn').forEach(function (b) { b.disabled = busy; });
      }

      function collectIds(list) {
        return Array.from(list.querySelectorAll('.submission-card.selected'))
          .map(function (c) { return c.dataset.id; })
          .filter(Boolean);
      }

      // ── Pending: load + render ───────────────────────────
      function loadPending() {
        pendingList.innerHTML = '<p class="pending-empty" style="color:rgba(245,239,230,0.2)">Loading…</p>';
        approveSelectedWrap.hidden = true;
        rejectSelectedWrap.hidden = true;
        approveStatus.textContent = '';
        rejectStatus.textContent = '';

        sb.from('remembrances')
          .select('id,name,connection,message,created_at')
          .eq('status', 'pending')
          .order('created_at', { ascending: false })
          .then(function (res) {
            if (res.error) {
              pendingList.innerHTML = '<p class="pending-empty" style="color:rgba(220,100,100,0.7)">Failed to load — ' + res.error.message + '</p>';
              return;
            }
            var rows = res.data || [];
            pendingTitle.textContent = 'Pending (' + rows.length + ')';
            pendingList.innerHTML = '';
            if (!rows.length) {
              pendingList.innerHTML = '<p class="pending-empty">No pending remembrances.</p>';
              return;
            }
            rows.forEach(function (row) {
              pendingList.appendChild(buildPendingCard(row));
            });
            approveSelectedWrap.hidden = false;
            rejectSelectedWrap.hidden = false;
            updateApproveBtn();
            updateRejectBtn();
          });
      }

      function buildPendingCard(row) {
        var card = document.createElement('div');
        card.className = 'submission-card selectable';
        card.dataset.id = row.id;

        var checkbox = document.createElement('div');
        checkbox.className = 'card-checkbox';

        card.innerHTML =
          '<p class="card-meta">Submitted ' + formatDate(row.created_at) + '</p>' +
          '<p class="card-name"></p>' +
          '<p class="card-connection"></p>' +
          '<p class="card-message"></p>' +
          '<div class="card-actions">' +
            '<button class="btn btn-approve" type="button">Approve</button>' +
            '<button class="btn btn-edit" type="button">Edit &amp; Approve</button>' +
            '<button class="btn btn-reject" type="button">Reject</button>' +
          '</div>' +
          '<p class="card-status" hidden></p>';

        card.insertBefore(checkbox, card.firstChild);

        card.querySelector('.card-name').textContent       = row.name || '(no name)';
        card.querySelector('.card-connection').textContent = row.connection || '';
        card.querySelector('.card-message').textContent    = row.message || '';

        var approveBtn = card.querySelector('.btn-approve');
        var editBtn    = card.querySelector('.btn-edit');
        var rejectBtn  = card.querySelector('.btn-reject');
        var statusEl   = card.querySelector('.card-status');

        card.addEventListener('click', function () {
          if (card.style.opacity) { return; }
          card.classList.toggle('selected');
          checkbox.textContent = card.classList.contains('selected') ? '✓' : '';
          updateApproveBtn();
          updateRejectBtn();
        });

        [approveBtn, editBtn, rejectBtn].forEach(function (btn) {
          btn.addEventListener('click', function (e) { e.stopPropagation(); });
        });

        approveBtn.addEventListener('click', function () {
          setCardBusy(card, true);
          approveEntry(row.id, null, card, statusEl);
        });

        editBtn.addEventListener('click', function () {
          if (card.querySelector('.edit-form')) { return; }
          var editForm = buildEditForm({
            name: row.name, connection: row.connection, message: row.message
          }, function (edited) {
            setCardBusy(card, true);
            approveEntry(row.id, edited, card, statusEl);
          });
          card.appendChild(editForm);
        });

        rejectBtn.addEventListener('click', function () {
          if (!confirm('Reject this submission from ' + (row.name || 'unknown') + '?')) { return; }
          setCardBusy(card, true);
          rejectEntry(row.id, card, statusEl);
        });

        return card;
      }

      function approveEntry(id, edits, card, statusEl) {
        statusEl.textContent = 'Approving…';
        statusEl.hidden = false;

        var update = {
          status: 'approved',
          approved_at: new Date().toISOString()
        };
        if (edits) {
          update.name = edits.name;
          update.connection = edits.connection || null;
          update.message = edits.message;
        }

        sb.from('remembrances').update(update).eq('id', id).then(function (res) {
          if (res.error) {
            statusEl.textContent = 'Error: ' + res.error.message;
            setCardBusy(card, false);
            return;
          }
          statusEl.textContent = '✓ Published.';
          card.style.opacity = '0.4';
          card.querySelectorAll('.btn').forEach(function (b) { b.disabled = true; });
          setTimeout(function () { loadPending(); loadPublished(); }, 600);
        });
      }

      function rejectEntry(id, card, statusEl) {
        statusEl.textContent = 'Rejecting…';
        statusEl.hidden = false;

        sb.from('remembrances').delete().eq('id', id).then(function (res) {
          if (res.error) {
            statusEl.textContent = 'Error: ' + res.error.message;
            setCardBusy(card, false);
            return;
          }
          card.style.opacity = '0.3';
          statusEl.textContent = 'Rejected and removed.';
          card.querySelectorAll('.btn').forEach(function (b) { b.disabled = true; });
          setTimeout(loadPending, 600);
        });
      }

      // ── Inline edit form (used by both pending + published) ──
      function buildEditForm(data, onSave, saveLabel) {
        var form = document.createElement('div');
        form.className = 'edit-form';
        form.innerHTML =
          '<div class="edit-field"><label class="edit-label">Name</label><input class="edit-input" id="ef-name"></div>' +
          '<div class="edit-field"><label class="edit-label">Connection</label><input class="edit-input" id="ef-conn"></div>' +
          '<div class="edit-field"><label class="edit-label">Message</label><textarea class="edit-textarea" id="ef-msg"></textarea></div>' +
          '<div class="edit-actions">' +
            '<button class="btn btn-approve" type="button">' + (saveLabel || 'Approve with edits') + '</button>' +
            '<button class="btn btn-reject" type="button" style="border-color:rgba(245,239,230,0.15);color:rgba(245,239,230,0.3)">Cancel</button>' +
          '</div>';

        form.addEventListener('click', function (e) { e.stopPropagation(); });

        form.querySelector('#ef-name').value = data.name || '';
        form.querySelector('#ef-conn').value = data.connection || '';
        form.querySelector('#ef-msg').value  = data.message || '';

        var btns = form.querySelectorAll('.btn');
        btns[0].addEventListener('click', function () {
          onSave({
            name:       form.querySelector('#ef-name').value.trim(),
            connection: form.querySelector('#ef-conn').value.trim(),
            message:    form.querySelector('#ef-msg').value.trim()
          });
        });
        btns[1].addEventListener('click', function () {
          form.parentNode.removeChild(form);
        });

        return form;
      }

      // ── Published: load + render ─────────────────────────
      function loadPublished() {
        publishedList.innerHTML = '<p class="pending-empty" style="color:rgba(245,239,230,0.2)">Loading…</p>';
        deleteSelectedWrap.hidden = true;
        deleteStatus.textContent = '';

        sb.from('remembrances')
          .select('id,name,connection,message,created_at')
          .eq('status', 'approved')
          .order('created_at', { ascending: true })
          .then(function (res) {
            if (res.error) {
              publishedList.innerHTML = '<p class="pending-empty" style="color:rgba(220,100,100,0.7)">Failed to load — ' + res.error.message + '</p>';
              return;
            }
            var rows = res.data || [];
            publishedTitle.textContent = 'Published (' + rows.length + ')';
            publishedList.innerHTML = '';
            if (!rows.length) {
              publishedList.innerHTML = '<p class="pending-empty">No published remembrances.</p>';
              return;
            }
            rows.forEach(function (row) {
              publishedList.appendChild(buildPublishedCard(row));
            });
            deleteSelectedWrap.hidden = false;
            updateDeleteBtn();
          });
      }

      function buildPublishedCard(row) {
        var card = document.createElement('div');
        card.className = 'submission-card selectable';
        card.dataset.id = row.id;

        var checkbox = document.createElement('div');
        checkbox.className = 'card-checkbox';

        var nameEl = document.createElement('p');
        nameEl.className = 'card-name';
        nameEl.textContent = row.name || '(no name)';

        var connEl = document.createElement('p');
        connEl.className = 'card-connection';
        var year = formatYear(row.created_at);
        connEl.textContent = (row.connection ? row.connection + ' · ' : '') + year;

        var msgEl = document.createElement('p');
        msgEl.className = 'card-message';
        msgEl.textContent = row.message || '';

        var actions = document.createElement('div');
        actions.className = 'card-actions';

        var editBtn = document.createElement('button');
        editBtn.className = 'btn btn-edit';
        editBtn.type = 'button';
        editBtn.textContent = 'Edit';

        var statusEl = document.createElement('p');
        statusEl.className = 'card-status';
        statusEl.hidden = true;

        actions.appendChild(editBtn);

        card.appendChild(checkbox);
        card.appendChild(nameEl);
        card.appendChild(connEl);
        card.appendChild(msgEl);
        card.appendChild(actions);
        card.appendChild(statusEl);

        card.addEventListener('click', function () {
          card.classList.toggle('selected');
          checkbox.textContent = card.classList.contains('selected') ? '✓' : '';
          updateDeleteBtn();
        });

        editBtn.addEventListener('click', function (e2) {
          e2.stopPropagation();
          if (card.querySelector('.edit-form')) { return; }
          var editForm = buildEditForm({
            name: row.name, connection: row.connection, message: row.message
          }, function (edited) {
            setCardBusy(card, true);
            updatePublishedEntry(row.id, edited, card, statusEl);
          }, 'Save changes');
          card.appendChild(editForm);
        });

        return card;
      }

      function updatePublishedEntry(id, edited, card, statusEl) {
        statusEl.textContent = 'Saving…';
        statusEl.hidden = false;

        sb.from('remembrances').update({
          name: edited.name,
          connection: edited.connection || null,
          message: edited.message
        }).eq('id', id).then(function (res) {
          if (res.error) {
            statusEl.textContent = 'Error: ' + res.error.message;
            setCardBusy(card, false);
            return;
          }
          statusEl.textContent = '✓ Saved.';
          setTimeout(loadPublished, 600);
        });
      }

      // ── Batch button label updates ───────────────────────
      function updateDeleteBtn() {
        var n = publishedList.querySelectorAll('.submission-card.selected').length;
        deleteSelectedBtn.disabled = n === 0;
        deleteSelectedBtn.textContent = n > 0 ? 'Delete Selected (' + n + ')' : 'Delete Selected';
      }

      function updateApproveBtn() {
        var n = pendingList.querySelectorAll('.submission-card.selected').length;
        approveSelectedBtn.disabled = n === 0;
        approveSelectedBtn.textContent = n > 0 ? 'Approve Selected (' + n + ')' : 'Approve Selected';
      }

      function updateRejectBtn() {
        var n = pendingList.querySelectorAll('.submission-card.selected').length;
        rejectSelectedBtn.disabled = n === 0;
        rejectSelectedBtn.textContent = n > 0 ? 'Reject Selected (' + n + ')' : 'Reject Selected';
      }

      // ── Batch actions ────────────────────────────────────
      approveSelectedBtn.addEventListener('click', function () {
        var ids = collectIds(pendingList);
        if (!ids.length) { return; }
        if (!confirm('Approve ' + ids.length + ' remembrance' + (ids.length > 1 ? 's' : '') + '?')) { return; }

        approveSelectedBtn.disabled = true;
        approveStatus.textContent = 'Approving…';

        sb.from('remembrances').update({
          status: 'approved',
          approved_at: new Date().toISOString()
        }).in('id', ids).then(function (res) {
          if (res.error) {
            approveStatus.textContent = 'Error — ' + res.error.message;
            approveSelectedBtn.disabled = false;
            return;
          }
          approveStatus.textContent = '✓ Published ' + ids.length + '. Reloading…';
          setTimeout(function () { loadPending(); loadPublished(); }, 600);
        });
      });

      rejectSelectedBtn.addEventListener('click', function () {
        var ids = collectIds(pendingList);
        if (!ids.length) { return; }
        if (!confirm('Reject ' + ids.length + ' submission' + (ids.length > 1 ? 's' : '') + '?')) { return; }

        rejectSelectedBtn.disabled = true;
        rejectStatus.textContent = 'Rejecting…';

        sb.from('remembrances').delete().in('id', ids).then(function (res) {
          if (res.error) {
            rejectStatus.textContent = 'Error — ' + res.error.message;
            rejectSelectedBtn.disabled = false;
            return;
          }
          rejectStatus.textContent = '✓ Rejected ' + ids.length + '. Reloading…';
          setTimeout(loadPending, 600);
        });
      });

      deleteSelectedBtn.addEventListener('click', function () {
        var ids = collectIds(publishedList);
        if (!ids.length) { return; }
        if (!confirm('Delete ' + ids.length + ' remembrance' + (ids.length > 1 ? 's' : '') + '? This cannot be undone.')) { return; }

        deleteSelectedBtn.disabled = true;
        deleteStatus.textContent = 'Deleting…';

        sb.from('remembrances').delete().in('id', ids).then(function (res) {
          if (res.error) {
            deleteStatus.textContent = 'Error — ' + res.error.message;
            deleteSelectedBtn.disabled = false;
            return;
          }
          deleteStatus.textContent = '✓ Deleted ' + ids.length + '. Reloading…';
          setTimeout(loadPublished, 600);
        });
      });

      // ── Boot ─────────────────────────────────────────────
      sb.auth.getSession().then(function (res) {
        if (res.data && res.data.session) {
          handleSession(res.data.session);
        }
      });

    }());
  </script>

</body>
</html>
